services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clipsense
      POSTGRES_PASSWORD: clipsense
      POSTGRES_DB: clipsense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipsense"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible local storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"    # MinIO console at http://localhost:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile.api
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://clipsense:clipsense@postgres:5432/clipsense
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      APP_ENV: development
      DEBUG: "true"
      EMAIL_MOCK: "true"
      CORS_ORIGINS: '["http://localhost:5173"]'
      NUMBA_CACHE_DIR: /tmp/numba_cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - whisper_cache:/home/appuser/.cache/whisper

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile.worker
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://clipsense:clipsense@postgres:5432/clipsense
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      NUMBA_CACHE_DIR: /tmp/numba_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - whisper_cache:/home/appuser/.cache/whisper
      - /tmp/clipsense:/tmp/clipsense

  # ── React Frontend (dev server) ───────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
  minio_data:
  whisper_cache:
